# ---------------------------------------------------------------------------
# Curated, credible source feeds for AwesomeSecurityResearch.
#
# Only first-party security researchers, vendors with dedicated research teams,
# standards bodies, and peer-reviewed venues are included. News aggregators are
# intentionally excluded to keep signal high and provenance clear.
#
# Each feed is tagged with the domain(s) it most often covers. The aggregator
# still classifies every item independently by keyword, so a feed tagged
# "AI Security" can still contribute a Web or Mobile item.
# ---------------------------------------------------------------------------

# The hard freshness window (how old a resource may be) lives in config.yaml
# as `max_age_days` — a single source of truth used by every ingestor and the
# pool-pruning step. We track only the latest research.

# ---------------------------------------------------------------------------
# Twitter / X ingestion (via Agent Reach -> twitter-cli). Runs LOCALLY only —
# never in CI (datacenter-IP ban risk). Use a DEDICATED BURNER account and
# follow the AI/security accounts you want tracked on it.
# ---------------------------------------------------------------------------
twitter:
  home_feed: true          # scan the burner's home timeline
  # Curated X accounts now live in the ranked registry (data/sources.json,
  # type: x_account) — add with `python scripts/add_source.py x_account @handle`.
  # Per-run caps live in config.yaml (limits.twitter_feed / twitter_user_posts).

# LinkedIn is auth-walled; ad-hoc adds fall back to pasted text/file. Handled
# by scripts/add.py, not the batch aggregator.
linkedin:
  note: "Use `python scripts/add.py <url>`; if the fetch is blocked, paste with --text/--file."

# ---------------------------------------------------------------------------
# GitHub trending/novel repo discovery (via `gh search repos`). Surfaces new
# security research, tools, vulns, and patterns. Runs on Windows (gh is authed).
# Novelty is judged at analysis time; well-known/old repos score low and are
# held as needs_review by the curation gate.
# ---------------------------------------------------------------------------
github:
  min_stars: 40          # ignore repos below this (noise floor)
  per_query: 8           # top-N per query by stars (created within config max_age_days)
  # Search queries and watched users now live in the ranked registry
  # (data/sources.json, type: github_query / github_user) — add with
  # `python scripts/add_source.py github_query "<query>"` or `github_user <name>`.

