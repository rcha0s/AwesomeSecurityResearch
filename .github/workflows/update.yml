name: Render research site

# Keeps the rendered knowledge base in sync with the data pools. This job does
# NOT do LLM analysis or Twitter ingestion (those run locally via the
# /research-scan + /add-resource skills — datacenter IPs risk the X account).
# It re-ranks the committed pools (time-decayed newness re-sorts them as findings
# age) and regenerates README.md, the security/ and ai/ trees, skills, and
# LEARNINGS.md, committing any drift.

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC (refreshes decayed ranking)
  push:
    branches: [main]
    paths:
      - "data/security.json"
      - "data/ai.json"
      - "scripts/**"
      - "config.yaml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Re-rank pools
        run: python scripts/rerank.py

      - name: Regenerate site + skills
        run: |
          python scripts/generate_site.py
          python scripts/generate_skills.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add data/security.json data/ai.json data/archive.json README.md LEARNINGS.md security ai skills
            git commit -m "chore: render refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
