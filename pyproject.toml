[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]
# E501 (line length) is left to black; long f-strings/markdown lines are fine.
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["scripts"]
addopts = "-q"
testpaths = ["tests"]
